<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .card-header{
            text-align:center;
            background:#0d6efd;
            color:white;
            font-size:24px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="card login-card">

    <div class="card-header">
        Sistema Seguro
    </div>

    <div class="card-body">

        <h5 class="text-center mb-4">
            Inicio de Sesión
        </h5>

        <form action="/login" method="POST">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input
                    type="text"
                    name="usuario"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">
                Ingresar
            </button>

        </form>

    </div>

</div>

</body>
</html>
